apiVersion: v1
kind: Service
metadata:
  name: devdeploy-backend
  namespace: devdeploy
spec:
  type: NodePort
  selector:
    app: devdeploy-backend
  ports:
  - name: http
    port: 4000
    targetPort: 4000
    nodePort: 30400
---
apiVersion: v1
kind: Service
metadata:
  name: devdeploy-frontend
  namespace: devdeploy
spec:
  type: NodePort
  selector:
    app: devdeploy-frontend
  ports:
  - name: http
    port: 5173
    targetPort: 5173
    nodePort: 30517
